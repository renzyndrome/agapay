server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # hashed build assets + brand mark: cache hard
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback for client-side routes (/disciples/:id, /admin/...)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
